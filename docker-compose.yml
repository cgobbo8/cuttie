services:
  # ── Infrastructure (always starts with `docker compose up`) ────

  redis:
    image: redis:7-alpine
    container_name: cuttie_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    container_name: cuttie_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: cuttie
      MINIO_ROOT_PASSWORD: cuttieminio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set cuttie http://minio:9000 cuttie cuttieminio;
      mc mb --ignore-existing cuttie/cuttie;
      mc anonymous set download cuttie/cuttie;
      echo 'Bucket ready';
      "

  # ── Application (starts with `docker compose --profile app up`) ─

  frontend:
    profiles: ["app"]
    build:
      context: frontend
    container_name: cuttie_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - API_URL=http://api:3333
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
    restart: unless-stopped

  api:
    profiles: ["app"]
    build: .
    container_name: cuttie_api
    working_dir: /workspace/api
    command: >
      sh -c "node ace migration:run --force && node ace serve --hmr"
    ports:
      - "3333:3333"
    env_file: api/.env
    environment:
      - HOST=0.0.0.0
      - REDIS_HOST=redis
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=cuttie
      - S3_SECRET_KEY=cuttieminio
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./api:/workspace/api
      - ./backend:/workspace/backend
      - api_node_modules:/workspace/api/node_modules
      - backend_venv:/workspace/backend/.venv
      - model_cache:/root/.cache
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    profiles: ["app"]
    build: .
    container_name: cuttie_worker
    working_dir: /workspace/backend
    command: uv run python worker.py
    env_file: backend/.env
    environment:
      - REDIS_HOST=redis
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=cuttie
      - S3_SECRET_KEY=cuttieminio
    volumes:
      - ./backend:/workspace/backend
      - backend_venv:/workspace/backend/.venv
      - model_cache:/root/.cache
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
  frontend_node_modules:
  api_node_modules:
  backend_venv:
  model_cache:
